<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
    <marker id="arr-teal" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#00796b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-weight="700" font-size="14" fill="#333">CLC Pipeline (clc_pipe)</text>

  <!-- ===== Producer: Scheduler Warp ===== -->
  <rect x="20" y="45" width="200" height="145" rx="8" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
  <text x="120" y="67" text-anchor="middle" font-weight="700" font-size="13" fill="#00796b">Scheduler (warp 2)</text>
  <text x="120" y="83" text-anchor="middle" font-size="10" fill="#00796b">Producer</text>

  <rect x="32" y="95" width="176" height="16" rx="3" fill="#e8f5e9" stroke="#00796b" stroke-width="0.8"/>
  <text x="120" y="106" text-anchor="middle" font-size="9" fill="#004d40" font-weight="600">producer_acquire()</text>

  <rect x="32" y="117" width="176" height="16" rx="3" fill="#e8f5e9" stroke="#00796b" stroke-width="0.8"/>
  <text x="120" y="128" text-anchor="middle" font-size="9" fill="#004d40" font-weight="600">arrive_and_expect_tx(16 bytes)</text>

  <rect x="32" y="139" width="176" height="16" rx="3" fill="#e8f5e9" stroke="#00796b" stroke-width="0.8"/>
  <text x="120" y="150" text-anchor="middle" font-size="9" fill="#004d40" font-weight="600">clc.try_cancel()</text>

  <rect x="32" y="161" width="176" height="16" rx="3" fill="#e8f5e9" stroke="#00796b" stroke-width="0.8"/>
  <text x="120" y="172" text-anchor="middle" font-size="9" fill="#004d40" font-weight="600">producer_advance()</text>

  <!-- ===== Shared Memory Buffer (center) ===== -->
  <rect x="260" y="45" width="240" height="145" rx="8" fill="#f8f8f8" stroke="#999" stroke-width="1.2"/>
  <text x="380" y="67" text-anchor="middle" font-weight="700" font-size="12" fill="#333">s_clc_response</text>
  <text x="380" y="83" text-anchor="middle" font-size="10" fill="#888">Shared Memory (16 bytes per slot)</text>

  <!-- Slot -->
  <rect x="280" y="98" width="200" height="36" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="310" y="113" font-size="10" fill="#e65100" font-weight="600">slot 0</text>
  <text x="310" y="127" font-size="9" fill="#888">is_valid | blockIdx.x | .y | .z</text>

  <text x="380" y="155" text-anchor="middle" font-size="9" fill="#888">CLC hardware writes response here</text>
  <text x="380" y="170" text-anchor="middle" font-size="9" fill="#888">mbarrier tracks the 16-byte arrival</text>

  <!-- Arrow: Producer -> Buffer -->
  <line x1="222" y1="116" x2="278" y2="116" stroke="#00796b" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- ===== Consumers (right) ===== -->
  <rect x="540" y="45" width="200" height="145" rx="8" fill="#ede7f6" stroke="#7e57c2" stroke-width="1.5"/>
  <text x="640" y="67" text-anchor="middle" font-weight="700" font-size="13" fill="#7e57c2">All Warps</text>
  <text x="640" y="83" text-anchor="middle" font-size="10" fill="#7e57c2">Consumers (7 warps, 224 threads)</text>

  <rect x="552" y="95" width="176" height="16" rx="3" fill="#f5f0ff" stroke="#7e57c2" stroke-width="0.8"/>
  <text x="640" y="106" text-anchor="middle" font-size="9" fill="#5e35b1" font-weight="600">consumer_acquire()</text>

  <rect x="552" y="117" width="176" height="16" rx="3" fill="#f5f0ff" stroke="#7e57c2" stroke-width="0.8"/>
  <text x="640" y="128" text-anchor="middle" font-size="9" fill="#5e35b1" font-weight="600">clc.query_response()</text>

  <rect x="552" y="139" width="176" height="16" rx="3" fill="#f5f0ff" stroke="#7e57c2" stroke-width="0.8"/>
  <text x="640" y="150" text-anchor="middle" font-size="9" fill="#5e35b1" font-weight="600">arrive_and_expect_tx(0)</text>

  <rect x="552" y="161" width="176" height="16" rx="3" fill="#f5f0ff" stroke="#7e57c2" stroke-width="0.8"/>
  <text x="640" y="172" text-anchor="middle" font-size="9" fill="#5e35b1" font-weight="600">consumer_advance()</text>

  <!-- Arrow: Buffer -> Consumers -->
  <line x1="482" y1="116" x2="538" y2="116" stroke="#7e57c2" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Consumer breakdown ===== -->
  <line x1="20" y1="210" x2="740" y2="210" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="380" y="232" text-anchor="middle" font-weight="700" font-size="12" fill="#333">Consumer warp actions after receiving the CLC response</text>

  <!-- TMA -->
  <rect x="20" y="248" width="160" height="70" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="100" y="268" text-anchor="middle" font-weight="600" font-size="11" fill="#e65100">TMA (warp 0)</text>
  <text x="100" y="286" text-anchor="middle" font-size="9" fill="#888">if valid: update offsets,</text>
  <text x="100" y="299" text-anchor="middle" font-size="9" fill="#888">load next tile's A &amp; B</text>

  <!-- MMA -->
  <rect x="200" y="248" width="160" height="70" rx="6" fill="#ede7f6" stroke="#7e57c2" stroke-width="1.2"/>
  <text x="280" y="268" text-anchor="middle" font-weight="600" font-size="11" fill="#7e57c2">MMA (warp 1)</text>
  <text x="280" y="286" text-anchor="middle" font-size="9" fill="#888">if valid: compute</text>
  <text x="280" y="299" text-anchor="middle" font-size="9" fill="#888">next tile's K-loop</text>

  <!-- Scheduler -->
  <rect x="380" y="248" width="160" height="70" rx="6" fill="#e0f2f1" stroke="#00796b" stroke-width="1.2"/>
  <text x="460" y="268" text-anchor="middle" font-weight="600" font-size="11" fill="#00796b">Scheduler (warp 2)</text>
  <text x="460" y="286" text-anchor="middle" font-size="9" fill="#888">if valid: issue next</text>
  <text x="460" y="299" text-anchor="middle" font-size="9" fill="#888">clc.try_cancel</text>

  <!-- Epilogue -->
  <rect x="560" y="248" width="180" height="70" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="650" y="268" text-anchor="middle" font-weight="600" font-size="11" fill="#1565c0">Epilogue (warps 4-7)</text>
  <text x="650" y="286" text-anchor="middle" font-size="9" fill="#888">if valid: update offsets,</text>
  <text x="650" y="299" text-anchor="middle" font-size="9" fill="#888">write next tile's result</text>

  <!-- Invalid path -->
  <rect x="200" y="338" width="360" height="30" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="380" y="358" text-anchor="middle" font-size="10" fill="#c62828" font-weight="600">if invalid: all thread groups break out of while True</text>

  <!-- Arrows from each warp box to invalid -->
  <line x1="100" y1="318" x2="100" y2="348" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="100" y1="348" x2="198" y2="348" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="280" y1="318" x2="280" y2="336" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="460" y1="318" x2="460" y2="336" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="650" y1="318" x2="650" y2="348" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="650" y1="348" x2="562" y2="348" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
</svg>
