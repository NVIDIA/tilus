<svg xmlns="http://www.w3.org/2000/svg" viewBox="25 10 610 225" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr-orange" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#e65100"/>
    </marker>
    <marker id="arr-purple" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#7e57c2"/>
    </marker>
    <marker id="arr-teal" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#00796b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="330" y="22" text-anchor="middle" font-weight="700" font-size="14" fill="#333">Three Pipelines and Four Warp Roles</text>

  <!-- ===== Four warp role boxes (y=42..97, h=55) ===== -->
  <rect x="30" y="42" width="130" height="55" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.2"/>
  <text x="95" y="64" text-anchor="middle" font-weight="700" font-size="12" fill="#333">TMA Warp</text>
  <text x="95" y="80" text-anchor="middle" font-size="9" fill="#888">warp 0 · gmem → smem</text>

  <rect x="180" y="42" width="130" height="55" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.2"/>
  <text x="245" y="64" text-anchor="middle" font-weight="700" font-size="12" fill="#333">MMA Warp</text>
  <text x="245" y="80" text-anchor="middle" font-size="9" fill="#888">warp 1 · smem → tmem</text>

  <rect x="330" y="42" width="150" height="55" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.2"/>
  <text x="405" y="64" text-anchor="middle" font-weight="700" font-size="12" fill="#333">Epilogue Group</text>
  <text x="405" y="80" text-anchor="middle" font-size="9" fill="#888">warps 4–7 · tmem → gmem</text>

  <rect x="500" y="42" width="130" height="55" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.2"/>
  <text x="565" y="64" text-anchor="middle" font-weight="700" font-size="12" fill="#333">Scheduler</text>
  <text x="565" y="80" text-anchor="middle" font-size="9" fill="#888">warp 2 · CLC try_cancel</text>

  <!-- ===== tma_pipe (y=122..162, h=40) ===== -->
  <rect x="55" y="122" width="155" height="40" rx="6" fill="#fff9f0" stroke="#e65100" stroke-width="1.2"/>
  <text x="132" y="140" text-anchor="middle" font-weight="600" font-size="11" fill="#e65100">tma_pipe</text>
  <text x="132" y="153" text-anchor="middle" font-size="8" fill="#888">smem · 4 slots · A &amp; B tiles</text>

  <!-- TMA produces into tma_pipe -->
  <line x1="80" y1="99" x2="80" y2="120" stroke="#e65100" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="86" y="113" font-size="8" fill="#e65100" font-weight="600">produce</text>

  <!-- MMA consumes from tma_pipe (label on left, right-aligned) -->
  <line x1="195" y1="120" x2="195" y2="99" stroke="#e65100" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="189" y="113" text-anchor="end" font-size="8" fill="#e65100" font-weight="600">consume</text>

  <!-- ===== mma_pipe (y=122..162, h=40) ===== -->
  <rect x="270" y="122" width="155" height="40" rx="6" fill="#f5f0ff" stroke="#7e57c2" stroke-width="1.2"/>
  <text x="347" y="140" text-anchor="middle" font-weight="600" font-size="11" fill="#7e57c2">mma_pipe</text>
  <text x="347" y="153" text-anchor="middle" font-size="8" fill="#888">tmem · 2 slots · accumulator</text>

  <!-- MMA produces into mma_pipe -->
  <line x1="295" y1="99" x2="295" y2="120" stroke="#7e57c2" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="301" y="113" font-size="8" fill="#7e57c2" font-weight="600">produce</text>

  <!-- Epilogue consumes from mma_pipe -->
  <line x1="400" y1="120" x2="400" y2="99" stroke="#7e57c2" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="406" y="113" font-size="8" fill="#7e57c2" font-weight="600">consume</text>

  <!-- ===== clc_pipe (y=190..230, h=40) ===== -->
  <rect x="30" y="190" width="600" height="40" rx="6" fill="#e8f5e9" stroke="#00796b" stroke-width="1.2"/>
  <text x="330" y="208" text-anchor="middle" font-weight="600" font-size="11" fill="#00796b">clc_pipe</text>
  <text x="330" y="221" text-anchor="middle" font-size="8" fill="#888">smem · 1 slot · 16-byte CLC response (is_valid, blockIdx)</text>

  <!-- Scheduler produces into clc_pipe -->
  <line x1="580" y1="99" x2="580" y2="188" stroke="#00796b" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="586" y="175" font-size="8" fill="#00796b" font-weight="600">produce</text>

  <!-- clc_pipe consumed by all four roles (routed outside data pipe boxes) -->
  <line x1="42" y1="188" x2="42" y2="99" stroke="#00796b" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="235" y1="188" x2="235" y2="99" stroke="#00796b" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="455" y1="188" x2="455" y2="99" stroke="#00796b" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="550" y1="188" x2="550" y2="99" stroke="#00796b" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- consume labels -->
  <text x="48" y="175" font-size="8" fill="#00796b" font-weight="600">consume</text>
  <text x="241" y="175" font-size="8" fill="#00796b" font-weight="600">consume</text>
  <text x="461" y="175" font-size="8" fill="#00796b" font-weight="600">consume</text>
  <text x="544" y="175" text-anchor="end" font-size="8" fill="#00796b" font-weight="600">consume</text>
</svg>
