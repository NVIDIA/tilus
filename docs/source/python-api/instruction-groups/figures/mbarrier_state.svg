<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 210" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">
  <!-- mbarrier 64-bit state in shared memory -->

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-weight="600" font-size="14" fill="#333">mbarrier State (64 bits in shared memory)</text>

  <!-- Fields -->
  <rect x="30" y="45" width="80" height="50" rx="4" fill="#e8f0fe" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="70" y="68" text-anchor="middle" font-weight="600" font-size="12" fill="#2a5fa5">phase</text>
  <text x="70" y="84" text-anchor="middle" font-size="10" fill="#666">1 bit</text>

  <rect x="130" y="45" width="140" height="50" rx="4" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="200" y="68" text-anchor="middle" font-weight="600" font-size="12" fill="#155724">pending arrivals</text>
  <text x="200" y="84" text-anchor="middle" font-size="10" fill="#666">count down to 0</text>

  <rect x="290" y="45" width="140" height="50" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="360" y="68" text-anchor="middle" font-weight="600" font-size="12" fill="#856404">pending tx-count</text>
  <text x="360" y="84" text-anchor="middle" font-size="10" fill="#666">bytes remaining</text>

  <rect x="450" y="45" width="120" height="50" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="510" y="68" text-anchor="middle" font-weight="600" font-size="12" fill="#721c24">expected arrivals</text>
  <text x="510" y="84" text-anchor="middle" font-size="10" fill="#666">for next phase</text>

  <!-- Phase completion condition -->
  <rect x="80" y="120" width="440" height="68" rx="6" fill="#f0f0f0" stroke="#999" stroke-width="1"/>
  <text x="300" y="140" text-anchor="middle" font-weight="600" font-size="12" fill="#333">Phase completes when:</text>
  <text x="300" y="158" text-anchor="middle" font-size="12" fill="#555">pending arrivals = 0  AND  pending tx-count = 0</text>
  <text x="300" y="178" text-anchor="middle" font-size="11" fill="#888">Then: phase flips, pending arrivals = expected arrivals, pending tx-count = 0</text>
</svg>
