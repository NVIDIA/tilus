<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">
  <!-- Tensor Memory 2D grid: 128 lanes (rows) x 512 columns -->

  <!-- Main grid -->
  <rect x="80" y="50" width="400" height="180" rx="3" fill="#fff9e6" stroke="#ffc107" stroke-width="1.5"/>

  <!-- Column groups (each 32 columns = 1 allocation unit) -->
  <rect x="80" y="50" width="25" height="180" fill="#fce4b8" stroke="#e8a020" stroke-width="0.5"/>
  <rect x="105" y="50" width="25" height="180" fill="#fff3cd" stroke="#e8a020" stroke-width="0.5"/>
  <rect x="130" y="50" width="25" height="180" fill="#fce4b8" stroke="#e8a020" stroke-width="0.5"/>
  <rect x="155" y="50" width="25" height="180" fill="#fff3cd" stroke="#e8a020" stroke-width="0.5"/>
  <!-- ... more columns implied -->
  <rect x="430" y="50" width="25" height="180" fill="#fce4b8" stroke="#e8a020" stroke-width="0.5"/>
  <rect x="455" y="50" width="25" height="180" fill="#fff3cd" stroke="#e8a020" stroke-width="0.5"/>

  <!-- Dotted region in middle to show continuation -->
  <text x="300" y="145" text-anchor="middle" font-size="16" fill="#999">. . .</text>

  <!-- Row labels (lanes) -->
  <text x="70" y="65" text-anchor="end" font-size="10" fill="#666">Lane 0</text>
  <text x="70" y="85" text-anchor="end" font-size="10" fill="#666">Lane 1</text>
  <text x="70" y="105" text-anchor="end" font-size="10" fill="#666">Lane 2</text>
  <text x="70" y="145" text-anchor="end" font-size="10" fill="#999">...</text>
  <text x="70" y="225" text-anchor="end" font-size="10" fill="#666">Lane 127</text>

  <!-- Row lines -->
  <line x1="80" y1="72" x2="480" y2="72" stroke="#e8a020" stroke-width="0.3"/>
  <line x1="80" y1="92" x2="480" y2="92" stroke="#e8a020" stroke-width="0.3"/>
  <line x1="80" y1="112" x2="480" y2="112" stroke="#e8a020" stroke-width="0.3"/>

  <!-- Column labels -->
  <text x="92" y="42" text-anchor="middle" font-size="10" fill="#666">Col 0</text>
  <text x="143" y="42" text-anchor="middle" font-size="10" fill="#666">Col 32</text>
  <text x="443" y="42" text-anchor="middle" font-size="10" fill="#666">Col 480</text>

  <!-- Dimension labels -->
  <text x="30" y="145" text-anchor="middle" font-weight="600" font-size="12" fill="#856404" transform="rotate(-90,30,145)">128 lanes (rows)</text>
  <text x="280" y="252" text-anchor="middle" font-weight="600" font-size="12" fill="#856404">512 columns</text>

  <!-- Cell size annotation -->
  <text x="280" y="272" text-anchor="middle" font-size="11" fill="#888">Each cell: 32 bits. Allocation unit: 32 columns.</text>
</svg>
