<script>
(function() {
  var pathParts = window.location.pathname.split('/').filter(Boolean);

  var baseUrl = '';
  var currentVersion = '';
  var relPageParts = [];

  if (pathParts.length >= 2) {
    baseUrl = '/' + pathParts[0];
    currentVersion = pathParts[1];
    relPageParts = pathParts.slice(2);
  }

  fetch(baseUrl + '/versions.json')
    .then(function(resp) {
      if (!resp.ok) throw new Error('not found');
      return resp.json();
    })
    .then(function(versions) {
      var headerButtons = document.querySelector('.article-header-buttons');
      if (!headerButtons) return;

      headerButtons.style.display = 'flex';
      headerButtons.style.alignItems = 'center';

      var select = document.createElement('select');
      select.title = 'Switch version';
      select.style.cssText = 'padding: 0.15rem 0.4rem; border-radius: 4px; border: 1px solid var(--pst-color-border); background: var(--pst-color-background); color: var(--pst-color-text-base); font-size: var(--pst-sidebar-font-size); cursor: pointer; appearance: auto; margin-right: 0.5rem; height: 2.25em;';

      versions.forEach(function(v) {
        var opt = document.createElement('option');
        opt.value = v.slug;
        opt.textContent = v.label;
        if (v.slug === currentVersion) opt.selected = true;
        select.appendChild(opt);
      });

      select.addEventListener('change', function() {
        var relPage = relPageParts.join('/') || 'index.html';
        window.location.href = baseUrl + '/' + select.value + '/' + relPage;
      });

      headerButtons.insertBefore(select, headerButtons.firstChild);
    })
    .catch(function() {});
})();
</script>
